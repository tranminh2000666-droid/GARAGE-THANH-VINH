<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Garage Ô tô Thanh Vinh</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #fff; }
        
        /* Menu */
        nav { background: #d32f2f; padding: 15px; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        
        /* Wrapper chính */
        .main-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            max-width: 1200px; 
            margin: auto; 
        }
        
        /* Logo: Thiết lập 1000px như yêu cầu */
        .logo-img { width: 100%; max-width: 1000px; display: block; margin-bottom: 0; }
        
        /* Info container: Đẩy sát logo bằng margin-top âm */
        .info-container { 
            text-align: left; 
            width: 100%; 
            max-width: 1000px; 
            margin-top: -60px; /* Điều chỉnh khoảng cách này để sát logo hơn */
            z-index: 1;
        }
        
        .address { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .hotline-box { 
            background: #ffc107; display: inline-block; padding: 15px 30px; 
            font-size: 26px; font-weight: bold; border-radius: 10px; color: #000;
        }
        
        /* Khu vực chứa xe: Căn trái */
        .car-container { 
            width: 100%; 
            max-width: 1000px; 
            display: flex; 
            justify-content: flex-start; /* Đẩy xe về bên trái */
            margin-top: 20px; 
        }
        .car-img { width: 100%; max-width: 500px; height: auto; }
        
        footer { text-align: center; padding: 30px; background: #f4f4f4; color: #666; margin-top: 20px; }
    </style>
</head>
<body>

<nav>
    <a href="#">TRANG CHỦ</a>
    <a href="#">GIỚI THIỆU</a>
    <a href="#">DỊCH VỤ</a>
    <a href="#">ALBUM</a>
    <a href="#">LIÊN HỆ</a>
</nav>

<div class="main-wrapper">
    <img src="logo.png" alt="Logo" class="logo-img">
    
    <div class="info-container">
        <div class="address">Địa chỉ: 26/3B Ấp Chánh 2, Tân Xuân, Hóc Môn, TP.HCM</div>
        <div class="hotline-box">Hotline: 0903.340.330 - Mr. Vinh</div>
    </div>
    
    <div class="car-container">
        <img src="car1.png" alt="Xe hơi" class="car-img">
    </div>
</div>

<footer>
    &copy; 2026 Garage Ô tô Thanh Vinh.
</footer>

</body>
</html>
