<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Garage Ô tô Thanh Vinh</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #fff; }
        
        /* Thanh Menu */
        nav { background: #d32f2f; padding: 15px; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        
        /* Bố cục chính */
        .main-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 40px; 
            max-width: 1400px; 
            margin: auto; 
        }
        
        /* Cột bên trái: Logo lớn, địa chỉ nhỏ hơn */
        .left-side { flex: 1.2; padding-right: 40px; }
        
        /* Logo: Tăng lên 900px để to hơn hẳn */
        .logo-img { max-width: 900px; width: 100%; display: block; margin-bottom: 10px; }
        
        /* Địa chỉ: Font nhỏ hơn logo */
        .address { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 20px; }
        
        /* Hotline: Nổi bật */
        .hotline-box { 
            background: #ffc107; display: inline-block; padding: 15px 30px; 
            font-size: 26px; font-weight: bold; border-radius: 10px; 
        }
        
        /* Cột bên phải: Xe */
        .right-side { flex: 0.8; text-align: right; }
        .car-img { max-width: 100%; height: auto; }
        
        footer { text-align: center; padding: 20px; background: #333; color: #fff; }
    </style>
</head>
<body>

<nav>
    <a href="#">TRANG CHỦ</a>
    <a href="#">GIỚI THIỆU</a>
    <a href="#">DỊCH VỤ</a>
    <a href="#">ALBUM</a>
    <a href="#">LIÊN HỆ</a>
</nav>

<div class="main-wrapper">
    <div class="left-side">
        <img src="logo.png" alt="Logo" class="logo-img">
        <div class="address">Địa chỉ: 26/3B Ấp Chánh 2, Tân Xuân, Hóc Môn, TP.HCM</div>
        <div class="hotline-box">Hotline: 0903.340.330 - Mr. Vinh</div>
    </div>
    
    <div class="right-side">
        <img src="car1.png" alt="Xe" class="car-img">
    </div>
</div>

<footer>
    &copy; 2026 Garage Ô tô Thanh Vinh.
</footer>

</body>
</html>
