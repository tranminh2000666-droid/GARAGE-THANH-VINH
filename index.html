<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Garage Ô tô Thanh Vinh</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #fff; }
        nav { background: #d32f2f; padding: 15px; text-align: center; }
        
        .main-wrapper { 
            display: grid;
            grid-template-columns: 1fr auto; /* Cột trái linh hoạt, cột phải (xe) cố định */
            align-items: center;
            gap: 20px; 
            max-width: 1400px; 
            margin: 20px auto;
            padding: 0 20px;
        }
        
        /* Đảm bảo khối bên trái sát lề và chữ giữ nguyên kích thước */
        .left-content { 
            text-align: left; 
            width: 100%; /* Chiếm toàn bộ không gian cột trái */
        }
        
        .logo-img { 
            display: block;
            width: 100%; 
            max-width: 800px; /* Logo giữ kích thước này */
            margin-left: 0; 
        }
        
        .address { 
            font-size: 20px; /* Chữ bình thường */
            font-weight: bold; 
            color: #333; 
            margin-top: 20px; 
            margin-bottom: 15px; 
        }
        
        .hotline-box { 
            background: #ffc107; 
            display: inline-block; 
            padding: 15px 30px; 
            font-size: 26px; /* Chữ bình thường */
            font-weight: bold; 
            border-radius: 10px; 
            color: #000;
        }
        
        .car-img { 
            width: 100%; 
            max-width: 700px; /* Kích thước xe như ý bạn */
            height: auto; 
        }
    </style>
</head>
<body>

<nav>
    <a href="#">TRANG CHỦ</a> ...
</nav>

<div class="main-wrapper">
    <div class="left-content">
        <img src="logo.png" alt="Logo" class="logo-img">
        <div class="address">Địa chỉ: 26/3B Ấp Chánh 2, Tân Xuân, Hóc Môn, TP.HCM</div>
        <div class="hotline-box">Hotline: 0903.340.330 - Mr. Vinh</div>
    </div>
    
    <div class="right-content">
        <img src="car1.png" alt="Xe hơi" class="car-img">
    </div>
</div>

</body>
</html>
