<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Garage Ô tô Thanh Vinh</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #fff; }
        nav { background: #d32f2f; padding: 15px; text-align: center; }
        
        /* Bố cục chính: Đảm bảo không bao giờ bị tràn */
        .wrapper { 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: space-between; 
            max-width: 1200px; 
            margin: 20px auto; 
            padding: 0 20px;
            overflow: hidden; /* Ngăn chặn nội dung bị đẩy ra ngoài */
        }
        
        /* Cột bên trái: Logo + Thông tin */
        .left-content { flex: 1; min-width: 0; }
        
        /* Logo: Đặt kích thước vừa phải để chừa chỗ cho xe */
        .logo-img { width: 100%; max-width: 600px; display: block; }
        
        .address { font-size: 20px; font-weight: bold; margin: 15px 0; }
        .hotline { 
            background: #ffc107; display: inline-block; padding: 15px 30px; 
            font-size: 26px; font-weight: bold; border-radius: 10px; 
        }
        
        /* Cột bên phải: Xe */
        .right-content { flex: 0 0 400px; text-align: right; }
        .car-img { width: 100%; max-width: 400px; height: auto; }
        
        footer { text-align: center; padding: 30px; background: #f4f4f4; color: #666; }
    </style>
</head>
<body>

<nav>
    <a style="color:white; font-weight:bold; text-decoration:none;" href="#">TRANG CHỦ</a>
</nav>

<div class="wrapper">
    <div class="left-content">
        <img src="logo.png" alt="Logo" class="logo-img">
        <div class="address">Địa chỉ: 26/3B Ấp Chánh 2, Tân Xuân, Hóc Môn, TP.HCM</div>
        <div class="hotline">Hotline: 0903.340.330 - Mr. Vinh</div>
    </div>
    
    <div class="right-content">
        <img src="car1.png" alt="Xe" class="car-img">
    </div>
</div>

<footer>&copy; 2026 Garage Ô tô Thanh Vinh</footer>
</body>
</html>
