<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Garage Ô tô Thanh Vinh</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #fff; }
        nav { background: #d32f2f; padding: 15px; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        
        /* Căn sát lề bằng cách bỏ padding container và dùng grid */
        .main-wrapper { 
            display: grid;
            grid-template-columns: 1fr 0.5fr; /* Tăng tỷ lệ cho cột trái */
            align-items: center;
            gap: 10px; 
            max-width: 1400px; /* Mở rộng tối đa */
            margin: 0; /* Bỏ margin để sát lề trái */
            padding-left: 0; 
        }
        
        .left-content { width: 100%; padding-left: 0; }
        
        /* Logo 1000px, căn lề trái */
        .logo-img { width: 100%; max-width: 1000px; display: block; margin-left: 0; }
        
        .info-container { 
            margin-top: -50px; 
            margin-left: 0; 
            z-index: 1;
        }
        
        .address { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .hotline-box { 
            background: #ffc107; display: inline-block; padding: 15px 30px; 
            font-size: 26px; font-weight: bold; border-radius: 10px; color: #000;
        }
        
        /* Xe bự hơn: tăng max-width lên 450px */
        .car-img { width: 100%; max-width: 450px; height: auto; }
        
        footer { text-align: center; padding: 30px; background: #f4f4f4; color: #666; margin-top: 50px; }
    </style>
</head>
<body>

<nav>
    <a href="#">TRANG CHỦ</a>
    <a href="#">GIỚI THIỆU</a>
    <a href="#">DỊCH VỤ</a>
    <a href="#">ALBUM</a>
    <a href="#">LIÊN HỆ</a>
</nav>

<div class="main-wrapper">
    <div class="left-content">
        <img src="logo.png" alt="Logo" class="logo-img">
        <div class="info-container">
            <div class="address">Địa chỉ: 26/3B Ấp Chánh 2, Tân Xuân, Hóc Môn, TP.HCM</div>
            <div class="hotline-box">Hotline: 0903.340.330 - Mr. Vinh</div>
        </div>
    </div>
    
    <div class="right-content">
        <img src="car1.png" alt="Xe hơi" class="car-img">
    </div>
</div>

<footer>
    &copy; 2026 Garage Ô tô Thanh Vinh.
</footer>

</body>
</html>
