<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Garage Ô tô Thanh Vinh</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #fff; }
        
        /* Menu */
        nav { background: #d32f2f; padding: 15px; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        
        /* Container chính với độ rộng 1200px */
        .main-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 40px 20px; 
            max-width: 1200px; 
            margin: auto; 
        }
        
        /* Cột trái: Logo và Thông tin */
        .left-side { flex: 1.5; padding-right: 30px; }
        
        /* Logo: Tối ưu với độ rộng lớn */
        .logo-img { width: 100%; max-width: 800px; display: block; margin-bottom: 15px; }
        
        /* Địa chỉ và Hotline */
        .address { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .hotline-box { 
            background: #ffc107; display: inline-block; padding: 15px 30px; 
            font-size: 26px; font-weight: bold; border-radius: 10px; color: #000;
        }
        
        /* Cột phải: Xe */
        .right-side { flex: 1; text-align: right; }
        .car-img { width: 100%; max-width: 500px; height: auto; }
        
        footer { text-align: center; padding: 30px; background: #f4f4f4; color: #666; }
    </style>
</head>
<body>

<nav>
    <a href="#">TRANG CHỦ</a>
    <a href="#">GIỚI THIỆU</a>
    <a href="#">DỊCH VỤ</a>
    <a href="#">ALBUM</a>
    <a href="#">LIÊN HỆ</a>
</nav>

<div class="main-wrapper">
    <div class="left-side">
        <img src="logo.png" alt="Logo Garage" class="logo-img">
        <div class="address">Địa chỉ: 26/3B Ấp Chánh 2, Tân Xuân, Hóc Môn, TP.HCM</div>
        <div class="hotline-box">Hotline: 0903.340.330 - Mr. Vinh</div>
    </div>
    
    <div class="right-side">
        <img src="car1.png" alt="Xe hơi" class="car-img">
    </div>
</div>

<footer>
    &copy; 2026 Garage Ô tô Thanh Vinh.
</footer>

</body>
</html>
