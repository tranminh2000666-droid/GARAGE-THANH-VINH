<!DOCTYPE html>
<html lang="vi">
<head>

        nav { background: #d32f2f; padding: 15px; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 16px; }

        .address { font-size: 18px; color: #333; margin: 10px 0; }
        .hotline { 
            background: #ffcc00; display: inline-block; padding: 15px 30px;

            color: #000; box-shadow: 0 4px 6px rgba(0,0,0,0.1);

    <img src="logo.png" alt="Logo Garage Thanh Vinh" style="max-width: 350px; height: auto;">
