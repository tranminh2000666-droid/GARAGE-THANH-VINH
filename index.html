<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Garage Ô tô Thanh Vinh</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #fff; }
        
        /* Menu */
        nav { background: #d32f2f; padding: 15px; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        
        /* Bố cục chính */
        .container { 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            max-width: 1400px; 
            margin: 20px auto; 
            padding: 0 20px;
            gap: 40px;
        }
        
        /* Khối bên trái: Logo + Thông tin */
        .left-side { flex: 1; }
        
        /* Logo: Tăng kích thước lên 900px */
        .logo-img { width: 100%; max-width: 900px; display: block; }
        
        .address { font-size: 20px; font-weight: bold; margin-top: 15px; margin-bottom: 10px; }
        .hotline { 
            background: #ffc107; display: inline-block; padding: 15px 30px; 
            font-size: 26px; font-weight: bold; border-radius: 10px; 
        }
        
        /* Khối bên phải: Xe (đã giảm 100px so với bản cũ) */
        .right-side { flex: 0; }
        .car-img { width: 100%; max-width: 450px; height: auto; }
        
        footer { text-align: center; padding: 30px; background: #f4f4f4; color: #666; margin-top: 30px; }
    </style>
</head>
<body>

<nav>
    <a href="#">TRANG CHỦ</a>
    <a href="#">GIỚI THIỆU</a>
    <a href="#">DỊCH VỤ</a>
    <a href="#">ALBUM</a>
    <a href="#">LIÊN HỆ</a>
</nav>

<div class="container">
    <div class="left-side">
        <img src="logo.png" alt="Logo" class="logo-img">
        <div class="address">Địa chỉ: 26/3B Ấp Chánh 2, Tân Xuân, Hóc Môn, TP.HCM</div>
        <div class="hotline">Hotline: 0903.340.330 - Mr. Vinh</div>
    </div>
    
    <div class="right-side">
        <img src="car1.png" alt="Xe" class="car-img">
    </div>
</div>

<footer>
    &copy; 2026 Garage Ô tô Thanh Vinh.
</footer>

</body>
</html>
