<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Ô tô Thanh Vinh</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #f9f9f9; }
        
        /* Menu */
        nav { background: #d32f2f; padding: 15px; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        
        /* Bố cục container */
        .container { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 20px 50px; 
            background: #fff;
            max-width: 1400px;
            margin: 20px auto;
        }
        
        /* Bên trái */
        .left-content { flex: 1; text-align: left; }
        .logo-img { max-width: 800px; height: auto; display: block; }
        
        /* Địa chỉ kéo lên sát logo */
        .address { font-size: 20px; color: #333; margin-top: -90px; margin-bottom: 20px; font-weight: bold; }
        
        .hotline { 
            background: #ffcc00; display: inline-block; padding: 15px 25px; 
            font-size: 24px; font-weight: bold; border-radius: 8px; color: #000;
        }
        
        /* Bên phải */
        .right-content { flex: 1; text-align: right; }
        .car-img { max-width: 90%; height: auto; }
        
        footer { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>

<nav>
    <a href="#">TRANG CHỦ</a>
    <a href="#">GIỚI THIỆU</a>
    <a href="#">DỊCH VỤ</a>
    <a href="#">ALBUM</a>
    <a href="#">LIÊN HỆ</a>
</nav>

<div class="container">
    <div class="left-content">
        <img src="logo.png" alt="Logo" class="logo-img">
        <div class="address">Địa chỉ: 26/3B Ấp Chánh 2, Tân Xuân, Hóc Môn, TP.HCM</div>
        <div class="hotline">Hotline: 0903.340.330 - Mr. Vinh</div>
    </div>
    
    <div class="right-content">
        <img src="car1.png" alt="Xe hơi" class="car-img">
    </div>
</div>

<footer>
    <p>&copy; 2026 Garage Ô tô Thanh Vinh.</p>
</footer>

</body>
</html>
